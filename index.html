<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>마감용사 (Deadline Hero)</title>
    <link href="https://webfontworld.github.io/gmarket/GmarketSans.css" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="bg-canvas"></canvas>

    <div id="app">

      <!-- SCREEN 1: Quest Setup -->
      <section id="screen-quest" class="screen active-screen">
        <div class="quest-header">
          <h1 class="game-title">마감용사<br><span>Deadline Hero</span></h1>
          <p class="subtitle">당신의 타자가 세상을 구원합니다.</p>
        </div>

        <form id="quest-form" class="pixel-box">
          <!-- Quest Type Toggle -->
          <div class="form-group">
            <label>퀘스트 목표</label>
            <div class="quest-type-tabs">
              <button type="button" class="quest-tab quest-tab--active" id="tab-chars">📝 목표 글자수</button>
              <button type="button" class="quest-tab" id="tab-time">⏱️ 목표 시간</button>
            </div>
          </div>

          <!-- Goal: Char Count -->
          <div class="form-group" id="goal-chars-group">
            <label for="goal-words">목표 글자 수 <span class="label-hint">(최소 10자)</span></label>
            <input type="number" id="goal-words" value="100" min="10" />
          </div>

          <!-- Goal: Time -->
          <div class="form-group" id="goal-time-group" style="display:none">
            <label for="goal-minutes">목표 시간 <span class="label-hint">(분, 최소 1분)</span></label>
            <input type="number" id="goal-minutes" value="10" min="1" max="180" />
          </div>

          <div class="form-group">
            <label for="weapon-sound">무기 (타건음)</label>
            <select id="weapon-sound">
              <option value="none">🔇 소리 없음</option>
              <option value="keyboard">⌨️ 기본 키보드</option>
              <option value="sword">⚔️ 검 휘두르기</option>
              <option value="magic">✨ 마법 발사</option>
            </select>
          </div>

          <div class="form-group">
            <label>난이도</label>
            <div class="difficulty-grid">
              <label class="difficulty-option">
                <input type="radio" name="difficulty" id="diff-normal" value="normal" checked>
                <span class="diff-btn">
                  <span class="diff-name">일반</span>
                  <span class="diff-desc">10초 자비</span>
                </span>
              </label>
              <label class="difficulty-option">
                <input type="radio" name="difficulty" id="diff-hardcore" value="hardcore">
                <span class="diff-btn diff-btn--hard">
                  <span class="diff-name">하드코어</span>
                  <span class="diff-desc">5초 자비</span>
                </span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>창 이탈 설정</label>
            <label class="toggle-row" for="focus-lock">
              <div class="toggle-switch">
                <input type="checkbox" id="focus-lock" checked>
                <span class="toggle-track">
                  <span class="toggle-thumb"></span>
                </span>
              </div>
              <div class="toggle-info">
                <span class="toggle-label-text" id="focus-lock-label">창 이탈 시 즉사</span>
                <span class="toggle-desc" id="focus-lock-desc">창을 벗어나면 즉시 패배합니다</span>
              </div>
            </label>
          </div>

          <div class="rules-hint">
            <span>⚠️</span>
            <p id="rules-hint-text">입력 멈춤 또는 창 이탈 시 글이 파괴됩니다</p>
          </div>

          <button type="submit" class="btn-primary">⚔️ 전장으로 입장</button>
        </form>
      </section>

      <!-- SCREEN 2: Battle -->
      <section id="screen-battle" class="screen">
        <!-- Boss HP Bar -->
        <div class="top-hud">
          <div class="hud-row">
            <span class="hud-label">💀 마감 몬스터 체력</span>
            <span id="progress-text" class="hud-value">0 / 100 자</span>
          </div>
          <div class="progress-bar-container">
            <div id="boss-hp-bar" class="progress-bar-fill boss-fill"></div>
          </div>
        </div>

        <!-- Idle Timer Bar (남은 시간 시각화) -->
        <div id="idle-timer-container">
          <div id="idle-timer-track">
            <div id="idle-timer-bar"></div>
          </div>
          <span id="idle-timer-label">안전</span>
        </div>

        <!-- Editor -->
        <div class="editor-container">
          <div id="text-editor" contenteditable="true" placeholder="세계의 운명이 당신의 손가락에 달렸습니다. 지금 타자를 시작하세요..."></div>
        </div>

        <!-- Tension Meter -->
        <div class="bottom-hud">
          <div class="hud-row">
            <span class="hud-label">⚡ 텐션</span>
            <span id="tension-value" class="hud-value tension-value-display">0%</span>
          </div>
          <div class="progress-bar-container tension-container">
            <div id="tension-bar" class="progress-bar-fill tension-fill"></div>
          </div>
        </div>

        <!-- Warning vignette overlay -->
        <div id="warning-overlay"></div>
      </section>

      <!-- SCREEN 3: Result -->
      <section id="screen-result" class="screen">
        <div class="pixel-box result-box">
          <h2 id="result-title">게임 오버</h2>
          <p id="result-desc">용사가 전장을 이탈하여 세계가 멸망했습니다.</p>

          <div id="surviving-text-container">
            <p class="surviving-label">생존한 텍스트</p>
            <blockquote id="surviving-text">...</blockquote>
          </div>

          <div class="result-actions">
            <button id="btn-copy" class="btn-secondary">📋 텍스트 복사</button>
            <button id="btn-download" class="btn-secondary">💾 .txt 다운로드</button>
            <button id="btn-retry" class="btn-primary">🔄 다시 도전</button>
          </div>
        </div>
      </section>

    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
